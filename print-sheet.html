<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 트레이너">
<meta name="theme-color" content="#3b82f6">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PT처방전 | A4 출력</title>
<style>
/* ─── 공통 ─────────────────────────────────────────────── */
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; background:#f8faff; color:#0f172a; min-height:100dvh; padding-bottom:80px; }

.header { background:#fff; border-bottom:1px solid #bfdbfe; padding:14px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
.header-title { font-size:16px; font-weight:800; flex:1; }
.header-title span { color:#3b82f6; }
.btn-back { background:none; border:1px solid #bfdbfe; border-radius:8px; color:#3b82f6; font-size:13px; font-weight:600; padding:7px 12px; cursor:pointer; flex-shrink:0; font-family:inherit; }

.tabs { display:flex; background:#fff; border-bottom:1px solid #bfdbfe; position:sticky; top:57px; z-index:99; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab-btn { flex:none; min-width:70px; padding:13px 16px; font-size:12px; font-weight:600; color:#64748b; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; font-family:inherit; }
.tab-btn.active { color:#3b82f6; border-bottom-color:#3b82f6; }

/* ─── 설정 패널 ──────────────────────────────────────────── */
.settings { background:#f0f9ff; border-bottom:1px solid #bfdbfe; padding:12px 16px; }
.s-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.s-row:last-child { margin-bottom:0; }
.s-label { font-size:11px; color:#64748b; font-weight:600; min-width:60px; flex-shrink:0; }
.s-input { flex:1; background:#fff; border:1.5px solid #bfdbfe; border-radius:8px; padding:8px 10px; font-size:13px; color:#0f172a; outline:none; font-family:inherit; }
.s-input:focus { border-color:#3b82f6; }
.s-input::placeholder { color:#94a3b8; }

/* ─── 워밍업 / 스트레칭 슬롯 ───────────────────────────── */
.sec-label { font-size:11px; font-weight:700; color:#E8660A; margin:8px 0 4px; letter-spacing:0.3px; }
.ex-slots { display:flex; gap:6px; flex-wrap:wrap; }
.ex-slot {
  width:90px; background:#fff; border:1.5px dashed #bfdbfe; border-radius:8px;
  overflow:hidden; cursor:pointer; flex-shrink:0; text-align:center;
}
.ex-slot:hover { border-color:#3b82f6; }
.ex-slot img { width:90px; height:56px; object-fit:cover; display:block; }
.ex-slot .slot-name { font-size:9px; color:#555; padding:3px 4px 4px; line-height:1.3; min-height:24px; word-break:keep-all; }
.ex-slot.empty { height:80px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8; font-size:10px; gap:4px; }
.ex-slot .remove-btn { font-size:10px; color:#ef4444; background:none; border:none; cursor:pointer; padding:1px 4px; }

/* ─── 코칭노트 ───────────────────────────────────────────── */
.coaching-grid { display:flex; flex-direction:column; gap:5px; }
.coaching-row { display:flex; align-items:center; gap:6px; }
.coaching-row .ex-badge { font-size:10px; font-weight:700; color:#fff; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.coaching-row input { flex:1; background:#fff; border:1.5px solid #bfdbfe; border-radius:6px; padding:5px 8px; font-size:11px; color:#0f172a; outline:none; font-family:inherit; }
.coaching-row input:focus { border-color:#3b82f6; }
.coaching-row input::placeholder { color:#94a3b8; }

/* ─── 캔버스 래퍼 ─────────────────────────────────────────── */
.canvas-wrap { padding:16px; display:flex; justify-content:center; background:#e8edf5; min-height:200px; }
.canvas-wrap canvas { box-shadow:0 2px 20px rgba(0,0,0,0.15); display:block; }

/* ─── 하단 버튼 ──────────────────────────────────────────── */
.action-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #bfdbfe; padding:10px 16px calc(10px + env(safe-area-inset-bottom)); display:flex; gap:8px; z-index:100; }
.act-btn { flex:1; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.act-print { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; }
.act-save  { background:linear-gradient(135deg,#E8660A,#c45508); color:#fff; }
.act-back  { background:#f0f9ff; color:#3b82f6; border:1.5px solid #bfdbfe; flex:0.5; }
.act-build { background:linear-gradient(135deg,#059669,#047857); color:#fff; flex:1.2; }

/* ─── 검색 모달 ──────────────────────────────────────────── */
.modal-bg { display:none; position:fixed; inset:0; background:#000c; z-index:200; flex-direction:column; }
.modal-bg.open { display:flex; }
.modal-dimmer { flex:0 0 50px; }
.modal-sheet { background:#fff; border-radius:24px 24px 0 0; flex:1; display:flex; flex-direction:column; overflow:hidden; }
.modal-handle { width:40px; height:4px; background:#e0e0e0; border-radius:2px; margin:12px auto 0; }
.modal-title-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 8px; border-bottom:1px solid #f0f0f0; }
.modal-title { font-size:15px; font-weight:800; color:#0f172a; }
.btn-modal-close { background:none; border:none; font-size:22px; color:#64748b; cursor:pointer; }
.modal-search { padding:10px 16px; border-bottom:1px solid #f0f0f0; }
.modal-search-box { background:#f0f9ff; border:1.5px solid #bfdbfe; border-radius:10px; padding:10px 14px; display:flex; gap:8px; }
.modal-search-box input { background:none; border:none; outline:none; flex:1; font-size:14px; color:#0f172a; font-family:inherit; }
.modal-filters { display:flex; gap:6px; padding:8px 16px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid #f0f0f0; }
.modal-filters::-webkit-scrollbar { display:none; }
.ftab { padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:1.5px solid #bfdbfe; color:#64748b; background:#eff6ff; white-space:nowrap; }
.ftab.active { background:#dbeafe; border-color:#3b82f6; color:#3b82f6; }
.modal-results { flex:1; overflow-y:auto; }
.result-item { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid #f0f4ff; cursor:pointer; }
.result-item:hover { background:#f8fbff; }
.result-item img { width:48px; height:36px; object-fit:cover; border-radius:4px; flex-shrink:0; background:#eee; }
.result-name { font-size:13px; font-weight:600; color:#0f172a; }
.result-meta { font-size:11px; color:#64748b; margin-top:2px; }
.search-empty { padding:40px; text-align:center; color:#94a3b8; font-size:13px; }

/* ─── 토스트 ──────────────────────────────────────────────── */
#toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:#dbeafe; color:#1d4ed8; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600; opacity:0; transition:opacity 0.3s; z-index:999; white-space:nowrap; pointer-events:none; border:1px solid #93c5fd; }

/* ─── 인쇄 ───────────────────────────────────────────────── */
@media print {
  @page { size:A4 portrait; margin:0; }
  body { background:white; padding:0; }
  .no-print, .action-bar, .header, .tabs, .settings { display:none !important; }
  .canvas-wrap { padding:0; background:white; justify-content:flex-start; }
  .canvas-wrap canvas { box-shadow:none; width:210mm !important; height:auto !important; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- 헤더 -->
<div class="header no-print">
  <button class="btn-back" onclick="location.href='image-card.html'">← 이미지생성</button>
  <div class="header-title">VERA<span>GYM</span> <span style="color:#E8660A;font-size:13px;">A4 처방전</span></div>
  <button class="btn-back" id="btnBuild" onclick="buildSheet()" style="background:#059669;color:#fff;border-color:#059669;font-size:12px;">🔄 생성</button>
</div>
<div class="tabs no-print">
  <button class="tab-btn" onclick="location.href='trainer-dash.html'">내 회원</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=logs'">수업일지</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=schedule'">일정</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=spt'">SPT</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=revenue'">매출관리</button>
  <button class="tab-btn" onclick="location.href='exercise-library.html'">운동DB</button>
  <button class="tab-btn active">이미지생성</button>
</div>

<!-- 설정 -->
<div class="settings no-print">

  <!-- 프로그램 제목 -->
  <div class="s-row">
    <span class="s-label">프로그램명</span>
    <input class="s-input" id="cfgTitle" placeholder="예) 유혜민 PT 1 프로그램">
  </div>

  <!-- 코칭 노트 -->
  <div class="sec-label" id="coachingLabel" style="display:none;">📋 포인트 코치 (선택)</div>
  <div class="coaching-grid" id="coachingGrid"></div>

  <!-- 워밍업 -->
  <div class="sec-label">🔥 워밍업 (운동 선택)</div>
  <div class="ex-slots" id="wuSlots">
    <div class="ex-slot empty" onclick="openPicker('wu',0)"><span style="font-size:20px;">＋</span><span>추가</span></div>
    <div class="ex-slot empty" onclick="openPicker('wu',1)"><span style="font-size:20px;">＋</span><span>추가</span></div>
    <div class="ex-slot empty" onclick="openPicker('wu',2)"><span style="font-size:20px;">＋</span><span>추가</span></div>
  </div>

  <!-- 스트레칭 -->
  <div class="sec-label">🧘 스트레칭 (운동 선택)</div>
  <div class="ex-slots" id="stSlots">
    <div class="ex-slot empty" onclick="openPicker('st',0)"><span style="font-size:20px;">＋</span><span>추가</span></div>
    <div class="ex-slot empty" onclick="openPicker('st',1)"><span style="font-size:20px;">＋</span><span>추가</span></div>
    <div class="ex-slot empty" onclick="openPicker('st',2)"><span style="font-size:20px;">＋</span><span>추가</span></div>
  </div>

</div>

<!-- 캔버스 미리보기 -->
<div class="canvas-wrap">
  <canvas id="a4Canvas"></canvas>
</div>

<!-- 하단 버튼 -->
<div class="action-bar no-print">
  <button class="act-btn act-back" onclick="location.href='image-card.html'">← 뒤로</button>
  <button class="act-btn act-build" onclick="buildSheet()">🔄 미리보기 생성</button>
  <button class="act-btn act-save" onclick="saveImage()">📥 이미지 저장</button>
  <button class="act-btn act-print" onclick="printSheet()">🖨️ 인쇄</button>
</div>

<!-- 운동 검색 모달 -->
<div id="pickerModal" class="modal-bg">
  <div class="modal-dimmer" onclick="closePicker()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title-bar">
      <span class="modal-title" id="pickerTitle">운동 선택</span>
      <button class="btn-modal-close" onclick="closePicker()">×</button>
    </div>
    <div class="modal-search">
      <div class="modal-search-box">
        <input type="text" id="pickerSearch" placeholder="운동 이름 검색..." oninput="onPickerSearch(this.value)" autocomplete="off">
      </div>
    </div>
    <div class="modal-filters" id="pickerFilters"></div>
    <div class="modal-results" id="pickerResults"><div class="search-empty">라이브러리 불러오는 중...</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
// ── 전역 상태 ───────────────────────────────────────────────
let sheetData  = null;   // 메인 운동 (localStorage)
let warmup     = [null, null, null];
let stretch    = [null, null, null];
let coaching   = [];     // 운동별 코칭노트 string[]
let trainer    = null;
let myLibrary  = [];
let pickerCtx  = null;   // { type:'wu'|'st', idx:number }
let filterPart = '';
let searchTm   = null;

const FONT  = `'Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
const EX_BG = ['#78909c','#4e86b7','#3d9f95','#5b9c5b','#d4813d','#8e6dbf'];

// ── 초기화 ──────────────────────────────────────────────────
(async function init() {
  // localStorage 운동 데이터
  try { sheetData = JSON.parse(localStorage.getItem('vg_print_sheet') || 'null'); } catch {}
  if (!sheetData?.exercises?.length) {
    toast('운동 데이터 없음 — 이미지생성 화면에서 다시 시도하세요');
    document.getElementById('cfgTitle').placeholder = '먼저 이미지생성 화면에서 운동을 추가해주세요';
  } else {
    // 프로그램 기본 제목
    document.getElementById('cfgTitle').value =
      sheetData.member ? `${sheetData.member} PT 1 프로그램` : '';

    // 코칭노트 입력란 생성
    coaching = sheetData.exercises.map(() => '');
    renderCoachingGrid();
  }

  // Supabase 초기화 → 세션 있을 때만 라이브러리 로드 (리다이렉트 없음)
  init_db();
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      const { data: row } = await db
        .from('trainers')
        .select('id, name, gym_location, is_active')
        .eq('user_id', session.user.id)
        .single();
      if (row?.is_active) {
        trainer = row;
        await loadLibrary();
      }
    }
  } catch (e) { /* 미로그인도 허용 */ }

  // 초기 미리보기 (이미지 없이 레이아웃만)
  buildSheet();
})();

// ── 코칭 입력란 ────────────────────────────────────────────
function renderCoachingGrid() {
  const grid = document.getElementById('coachingGrid');
  if (!sheetData?.exercises?.length) { grid.innerHTML=''; return; }
  document.getElementById('coachingLabel').style.display = 'block';
  grid.innerHTML = sheetData.exercises.map((ex, i) => `
    <div class="coaching-row">
      <div class="ex-badge" style="background:${EX_BG[i%EX_BG.length]}">${i+1}</div>
      <input placeholder="${ex.name} 코칭 포인트 (선택)" oninput="coaching[${i}]=this.value">
    </div>
  `).join('');
}

// ── 라이브러리 로드 ────────────────────────────────────────
async function loadLibrary() {
  const { data } = await db
    .from('trainer_exercises')
    .select('exercise_ref_id, is_favorite, use_count, exercise_refs(name_ko, name_en, part_unified, tool_unified, image_url)')
    .eq('trainer_id', trainer.id);
  myLibrary = (data||[]).map(te => ({
    refId:       te.exercise_ref_id,
    name:        te.exercise_refs?.name_ko || te.exercise_refs?.name_en || '',
    part:        te.exercise_refs?.part_unified || '',
    tool:        te.exercise_refs?.tool_unified || '',
    image_url:   te.exercise_refs?.image_url || null,
    is_favorite: te.is_favorite,
    use_count:   te.use_count || 0,
  })).sort((a,b)=>
    (b.is_favorite?1:0)-(a.is_favorite?1:0) || b.use_count-a.use_count || a.name.localeCompare(b.name,'ko')
  );
  buildFilterTabs();
}

function buildFilterTabs() {
  const parts = [...new Set(myLibrary.map(e=>e.part).filter(Boolean))];
  const filtersEl = document.getElementById('pickerFilters');
  filtersEl.innerHTML = [
    `<div class="ftab active" data-val="" onclick="setFilter(this,'')">전체</div>`,
    ...parts.map(p=>`<div class="ftab" data-val="${p}" onclick="setFilter(this,'${p}')">${p}</div>`)
  ].join('');
}

function setFilter(el, part) {
  filterPart = part;
  document.querySelectorAll('#pickerFilters .ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderPickerResults(document.getElementById('pickerSearch').value);
}

// ── 피커 모달 ──────────────────────────────────────────────
function openPicker(type, idx) {
  pickerCtx = { type, idx };
  document.getElementById('pickerTitle').textContent = type==='wu' ? '워밍업 운동 선택' : '스트레칭 운동 선택';
  document.getElementById('pickerSearch').value = '';
  filterPart = '';
  document.querySelectorAll('#pickerFilters .ftab').forEach(b=>b.classList.toggle('active', !b.dataset.val));
  renderPickerResults('');
  document.getElementById('pickerModal').classList.add('open');
}
function closePicker() {
  document.getElementById('pickerModal').classList.remove('open');
  pickerCtx = null;
}

function onPickerSearch(val) {
  clearTimeout(searchTm);
  searchTm = setTimeout(() => renderPickerResults(val), 220);
}

function renderPickerResults(q) {
  const el = document.getElementById('pickerResults');
  let list = myLibrary;
  if (filterPart) list = list.filter(e => e.part === filterPart);
  if (q.trim()) {
    const lq = q.toLowerCase();
    list = list.filter(e => e.name.toLowerCase().includes(lq));
  }
  if (!list.length) { el.innerHTML = '<div class="search-empty">검색 결과 없음</div>'; return; }
  el.innerHTML = list.map(ex => `
    <div class="result-item" onclick="pickExercise(${JSON.stringify(JSON.stringify(ex))})">
      ${ex.image_url ? `<img src="${ex.image_url}" crossOrigin="anonymous" loading="lazy">` : '<div style="width:48px;height:36px;background:#f0f0f0;border-radius:4px;flex-shrink:0;"></div>'}
      <div>
        <div class="result-name">${ex.name}</div>
        <div class="result-meta">${[ex.part,ex.tool].filter(Boolean).join(' · ')}</div>
      </div>
    </div>
  `).join('');
}

function pickExercise(jsonStr) {
  const ex = JSON.parse(jsonStr);
  if (!pickerCtx) return;
  const { type, idx } = pickerCtx;
  if (type === 'wu') { warmup[idx] = ex; renderSlots('wu'); }
  else               { stretch[idx] = ex; renderSlots('st'); }
  closePicker();
}

function renderSlots(type) {
  const arr  = type==='wu' ? warmup : stretch;
  const el   = document.getElementById(type==='wu' ? 'wuSlots' : 'stSlots');
  el.innerHTML = arr.map((ex,i) => ex
    ? `<div class="ex-slot">
         ${ex.image_url ? `<img src="${ex.image_url}" loading="lazy">` : '<div style="width:90px;height:56px;background:#eee;"></div>'}
         <div class="slot-name">${ex.name}<br><button class="remove-btn" onclick="removeSlot('${type}',${i})">✕ 제거</button></div>
       </div>`
    : `<div class="ex-slot empty" onclick="openPicker('${type}',${i})"><span style="font-size:20px;">＋</span><span>추가</span></div>`
  ).join('');
}

function removeSlot(type, idx) {
  if (type==='wu') warmup[idx]=null; else stretch[idx]=null;
  renderSlots(type);
}

// ── 이미지 로드 ────────────────────────────────────────────
function loadImg(url) {
  return new Promise(resolve => {
    if (!url) return resolve(null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null);
    setTimeout(() => resolve(null), 6000);
    img.src = url;
  });
}

// ── A4 캔버스 빌드 ─────────────────────────────────────────
async function buildSheet() {
  document.getElementById('btnBuild').textContent = '⏳ 생성중...';
  document.getElementById('btnBuild').disabled = true;

  const exercises = sheetData?.exercises || [];
  const title = document.getElementById('cfgTitle').value.trim() || 'PT 프로그램';
  const nEx = Math.min(exercises.length, 6);

  // ── 이미지 병렬 로드 ──
  const [exImgs, wuImgs, stImgs] = await Promise.all([
    Promise.all(exercises.slice(0, nEx).map(e => loadImg(e.image_url))),
    Promise.all(warmup.map(e => loadImg(e?.image_url))),
    Promise.all(stretch.map(e => loadImg(e?.image_url))),
  ]);

  // ── 캔버스 설정 ──
  const canvas = document.getElementById('a4Canvas');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const W = 794, H = 1123;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // 흰 배경
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  const MX = 22, PY = 20;
  const CW = W - MX*2;
  let y = PY;

  // ── 타이틀 ──
  ctx.font = `900 17px ${FONT}`;
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.fillText(title, W/2, y + 14);
  ctx.textAlign = 'left';
  y += 22;

  // 타이틀 하단 선
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(MX, y); ctx.lineTo(W-MX, y); ctx.stroke();
  y += 5;

  // ── 높이 계산 ──
  const wuCount  = warmup.filter(Boolean).length;
  const stCount  = stretch.filter(Boolean).length;
  const WU_H     = wuCount  ? 106 : 0;
  const ST_H     = stCount  ? 94  : 0;
  const GAP      = (wuCount||stCount) ? 6 : 0;
  const exAreaH  = H - y - WU_H - ST_H - GAP - PY;
  const EX_H     = nEx > 0 ? Math.floor(exAreaH / nEx) : 0;

  // ── 운동 블록 ──
  for (let i = 0; i < nEx; i++) {
    drawExBlock(ctx, exercises[i], exImgs[i], i, MX, y, CW, EX_H, coaching[i]||'');
    y += EX_H;
  }

  y += GAP;

  // ── 워밍업 ──
  if (wuCount) {
    await drawBottomSection(ctx, '워밍업', warmup, wuImgs, MX, y, CW, WU_H, '#E8660A');
    y += WU_H;
  }

  // ── 스트레칭 ──
  if (stCount) {
    await drawBottomSection(ctx, '스트레칭', stretch, stImgs, MX, y, CW, ST_H, '#3b82f6');
    y += ST_H;
  }

  document.getElementById('btnBuild').textContent = '🔄 생성';
  document.getElementById('btnBuild').disabled = false;
  toast('미리보기 생성 완료 ✓');
}

// ── 운동 블록 그리기 ──────────────────────────────────────
function drawExBlock(ctx, ex, imgObj, idx, x, y, w, h, coachingNote) {
  const HDR  = 20;   // 헤더 바 높이
  const COCH = 26;   // 코칭 영역 높이
  const BODY = h - HDR - COCH;
  const IMG_W = Math.round(w * 0.29);
  const color = EX_BG[idx % EX_BG.length];

  // ── 헤더 ──
  const grad = ctx.createLinearGradient(x, y, x+w*0.6, y);
  grad.addColorStop(0, color);
  grad.addColorStop(1, lighten(color, 30));
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, HDR);

  ctx.fillStyle = '#fff';
  ctx.font = `700 9.5px ${FONT}`;
  ctx.textAlign = 'left';
  const label = `${idx+1}.  ${ex.name}`;
  ctx.fillText(label, x+7, y+HDR/2+4);
  if (ex.part || ex.tool) {
    const lw = ctx.measureText(label).width;
    ctx.font = `400 8.5px ${FONT}`;
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillText(`  ${[ex.part,ex.tool].filter(Boolean).join(' · ')}`, x+7+lw, y+HDR/2+4);
  }

  // ── 바디 배경 ──
  ctx.fillStyle = '#f9f9f9';
  ctx.fillRect(x, y+HDR, w, BODY);

  // ── 운동 이미지 ──
  const imgX = x+1, imgY = y+HDR+1, imgH = BODY-2;
  if (imgObj) {
    const ar = imgObj.width / imgObj.height;
    let iw = IMG_W-4, ih = imgH-4;
    if (iw/ih > ar) iw = ih*ar; else ih = iw/ar;
    ctx.drawImage(imgObj, imgX + (IMG_W-4-iw)/2+2, imgY + (imgH-ih)/2, iw, ih);
  } else {
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(imgX, imgY, IMG_W-2, imgH);
    ctx.fillStyle = '#aaa'; ctx.font = `400 8px ${FONT}`; ctx.textAlign='center';
    ctx.fillText('이미지', imgX+IMG_W/2, imgY+imgH/2+3);
    ctx.textAlign='left';
  }

  // 이미지/테이블 구분선
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x+IMG_W, y+HDR); ctx.lineTo(x+IMG_W, y+HDR+BODY); ctx.stroke();

  // ── 세트 테이블 ──
  drawSetTable(ctx, ex, x+IMG_W+1, y+HDR, w-IMG_W-1, BODY);

  // ── 코칭 영역 ──
  const cy = y + HDR + BODY;
  ctx.fillStyle = '#f3f3f3';
  ctx.fillRect(x, cy, w, COCH);
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x, cy); ctx.lineTo(x+w, cy); ctx.stroke();

  ctx.fillStyle = '#666'; ctx.font = `400 8px ${FONT}`;
  ctx.fillText('포인트:', x+6, cy+10);
  ctx.fillStyle = '#222'; ctx.font = `500 8px ${FONT}`;
  ctx.fillText(coachingNote || '', x+44, cy+10);
  if (!coachingNote) {
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(x+44, cy+11); ctx.lineTo(x+w*0.55, cy+11); ctx.stroke();
  }

  ctx.fillStyle = '#666'; ctx.font = `400 8px ${FONT}`;
  ctx.fillText(`기구: ${ex.tool||''}`, x+6, cy+21);
  ctx.fillText('강도:', x + w*0.5 + 6, cy+21);

  // 하단 구분선
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x, y+h); ctx.lineTo(x+w, y+h); ctx.stroke();
}

function drawSetTable(ctx, ex, x, y, w, h) {
  const sets = ex.sets || [];
  const N    = Math.max(sets.length, 3);
  const TH   = Math.min(16, Math.round(h * 0.2));
  const rowH = (h - TH) / N;

  // 컬럼 비율: 세트 | kg | × | 회
  const C  = [Math.round(w*0.17), Math.round(w*0.34), Math.round(w*0.09), Math.round(w*0.34)];
  // 마지막 컬럼을 나머지로 조정
  C[3] = w - C[0] - C[1] - C[2];
  const CX = [x, x+C[0], x+C[0]+C[1], x+C[0]+C[1]+C[2]];

  // 헤더
  ctx.fillStyle = '#ebebeb';
  ctx.fillRect(x, y, w, TH);
  const hdrs = ['세트','kg','×','회'];
  ctx.fillStyle = '#555'; ctx.font = `700 7.5px ${FONT}`;
  hdrs.forEach((h_, i) => { ctx.textAlign='center'; ctx.fillText(h_, CX[i]+C[i]/2, y+TH/2+3); });

  // 행
  for (let r=0; r<N; r++) {
    const ry = y + TH + r*rowH;
    ctx.fillStyle = r%2===0 ? '#ffffff' : '#f9f9f9';
    ctx.fillRect(x, ry, w, rowH);

    ctx.strokeStyle = '#eee'; ctx.lineWidth = 0.4;
    ctx.beginPath(); ctx.moveTo(x, ry+rowH); ctx.lineTo(x+w, ry+rowH); ctx.stroke();

    ctx.fillStyle = '#444'; ctx.font = `700 8px ${FONT}`;
    ctx.textAlign='center';
    ctx.fillText(String(r+1), CX[0]+C[0]/2, ry+rowH/2+3);

    const s = sets[r];
    ctx.fillStyle = '#bbb'; ctx.font = `400 8px ${FONT}`;
    if (s?.weight) ctx.fillText(String(s.weight), CX[1]+C[1]/2, ry+rowH/2+3);
    ctx.fillText('×', CX[2]+C[2]/2, ry+rowH/2+3);
    if (s?.reps)   ctx.fillText(String(s.reps),   CX[3]+C[3]/2, ry+rowH/2+3);
  }

  // 세로 구분선
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
  CX.slice(1).forEach(cx => {
    ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx, y+h); ctx.stroke();
  });
  // 테이블 외곽선
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.8;
  ctx.strokeRect(x, y, w, h);
}

// ── 워밍업/스트레칭 섹션 ─────────────────────────────────
async function drawBottomSection(ctx, title, exArr, imgArr, x, y, w, h, color) {
  const HDR_H  = 18;
  const BODY_H = h - HDR_H;
  const valid  = exArr.map((e,i) => e ? { ...e, img:imgArr[i] } : null).filter(Boolean);
  const n      = valid.length;
  if (!n) return;

  // 헤더
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, HDR_H);
  ctx.fillStyle = '#fff'; ctx.font = `700 9px ${FONT}`;
  ctx.textAlign = 'left';
  ctx.fillText(title, x+8, y+HDR_H/2+3.5);

  const slotW  = Math.floor(w / n);
  const nameH  = 16;
  const imgH   = BODY_H - nameH - 4;

  valid.forEach((ex, i) => {
    const sx = x + i*slotW;

    if (ex.img) {
      const ar = ex.img.width / ex.img.height;
      let iw = slotW-6, ih = imgH;
      if (iw/ih > ar) iw = ih*ar; else ih = iw/ar;
      const ix = sx + (slotW-iw)/2;
      const iy = y + HDR_H + 2 + (imgH-ih)/2;
      ctx.drawImage(ex.img, ix, iy, iw, ih);
    } else {
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(sx+3, y+HDR_H+2, slotW-6, imgH);
    }

    // 이름
    ctx.fillStyle = '#222'; ctx.font = `600 8px ${FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText(ex.name, sx+slotW/2, y+HDR_H+2+imgH+12);

    // 슬롯 구분선
    if (i < n-1) {
      ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(sx+slotW, y+HDR_H);
      ctx.lineTo(sx+slotW, y+h);
      ctx.stroke();
    }
  });

  ctx.textAlign = 'left';

  // 섹션 외곽
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.8;
  ctx.strokeRect(x, y, w, h);
}

// ── 유틸: 색상 밝게 ──────────────────────────────────────
function lighten(hex, amount) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const R = Math.min(255, r+amount), G = Math.min(255, g+amount), B = Math.min(255, b+amount);
  return `rgb(${R},${G},${B})`;
}

// ── 저장 / 인쇄 ──────────────────────────────────────────
function saveImage() {
  const canvas = document.getElementById('a4Canvas');
  canvas.toBlob(blob => {
    if (!blob) { toast('저장 실패'); return; }
    const a = document.createElement('a');
    const name = sheetData?.member || '처방전';
    a.href = URL.createObjectURL(blob);
    a.download = `VERAGYM_${name}_처방전.png`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('이미지 저장 완료 ✓');
  }, 'image/png');
}

function printSheet() {
  const canvas = document.getElementById('a4Canvas');
  const dataUrl = canvas.toDataURL('image/png');
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <style>@page{size:A4 portrait;margin:0}body{margin:0}img{width:210mm;height:297mm;display:block;}</style>
  </head><body><img src="${dataUrl}" onload="window.print();window.close();"></body></html>`);
  win.document.close();
}

// ── 토스트 ───────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2200);
}
