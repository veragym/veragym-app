<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<title>VERA GYM | 수업일지</title>
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/session.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="header">
  <div>
    <div class="header-title">수업일지</div>
    <div class="header-sub" id="hdrMember"></div>
  </div>
  <button class="btn btn-sm btn-primary" id="btnSave">저장</button>
</div>

<!-- ── 메타 정보 ──────────────────────────────────────────── -->
<div class="meta-bar">
  <span class="meta-chip" id="metaDateChip"></span>
  <input type="date" id="metaDate" class="field-input" style="display:none;">
  <span class="meta-sub" id="hdrMeta"></span>
</div>

<!-- ── 운동 목록 ──────────────────────────────────────────── -->
<div id="exList" class="ex-list-area"></div>

<!-- ── 하단 액션 ──────────────────────────────────────────── -->
<div class="bottom-actions">
  <button class="btn btn-md btn-secondary" id="btnAddEx" style="flex:1;">운동 추가</button>
  <button class="btn btn-md btn-ghost" id="btnRoutine" style="flex:1;">루틴</button>
  <button class="btn btn-md btn-ghost" id="btnLibrary">운동DB</button>
</div>

<!-- ── PT 노트 ────────────────────────────────────────────── -->
<div class="note-section">
  <div class="field">
    <label class="field-label">메모</label>
    <textarea class="field-textarea" id="notesInput" rows="3" placeholder="오늘의 수업 메모"></textarea>
  </div>
  <div class="field">
    <label class="field-label">PT 노트 사진</label>
    <div id="notePhotoUpload" class="note-photo-upload">
      <input type="file" accept="image/*" capture="environment" id="notePhotoInput" style="display:none;">
      <button class="btn btn-sm btn-secondary" id="btnNotePhoto">사진 촬영/선택</button>
    </div>
    <div id="notePhotoPreview" style="display:none;" class="note-photo-preview">
      <img id="notePhotoImg">
      <div class="note-photo-actions">
        <button class="btn btn-sm btn-ghost" id="btnRotateNote">↺ 회전</button>
        <button class="btn btn-sm btn-danger" id="btnRemoveNote">삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- ── 루틴 가져오기 (링크) ────────────────────────────────── -->
<div id="trainerImportCard" style="display:none;" class="import-card">
  <div class="field-label mb-2">공유 링크로 루틴 가져오기</div>
  <div style="display:flex;gap:var(--space-2);">
    <input class="field-input" id="trainerLinkInput" placeholder="링크 또는 코드" style="flex:1;">
    <button class="btn btn-sm btn-primary" id="btnImportRoutine">가져오기</button>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── 카메라 입력 (숨김) ──────────────────────────────────── -->
<input type="file" accept="image/*" capture="environment" id="photoInputCamera" style="display:none;">
<input type="file" accept="image/*" id="photoInputGallery" style="display:none;">

<!-- ── 운동 검색 모달 ──────────────────────────────────────── -->
<div class="modal-bg" id="searchModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="search-bar mb-3">
      <input class="field-input" id="searchInput" placeholder="운동 검색">
    </div>
    <div id="filterTabs" class="chips mb-3"></div>
    <div id="searchResults"></div>
  </div>
</div>

<!-- ── 사진 촬영 모달 ──────────────────────────────────────── -->
<div class="modal-bg" id="photoModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="photoModalTitle">자세 사진</div>

    <!-- Step 1: 시작/끝 선택 -->
    <div id="photoStep1">
      <div class="photo-pose-grid">
        <button class="photo-pose-btn" data-pose="start">
          <div class="photo-pose-label">시작 자세</div>
          <div class="photo-pose-status" id="capStartStatus">미촬영</div>
        </button>
        <button class="photo-pose-btn" data-pose="end">
          <div class="photo-pose-label">끝 자세</div>
          <div class="photo-pose-status" id="capEndStatus">미촬영</div>
        </button>
      </div>
    </div>

    <!-- Step 2: 카메라/갤러리 -->
    <div id="photoStep2" style="display:none;">
      <div class="card-sub mb-3" id="photoSourceLabel">자세 선택</div>
      <div style="display:flex;gap:var(--space-2);">
        <button class="btn btn-lg btn-secondary" style="flex:1;" data-source="camera">카메라</button>
        <button class="btn btn-lg btn-ghost" style="flex:1;" data-source="gallery">갤러리</button>
      </div>
      <button class="btn btn-sm btn-ghost mt-3" id="btnBackToStep1">← 돌아가기</button>
    </div>

    <button class="btn btn-lg btn-cancel btn-block mt-4" id="photoModalClose">닫기</button>
  </div>
</div>

<!-- ── 사진 뷰어 ──────────────────────────────────────────── -->
<div class="mv-viewer-bg" id="photoViewer">
  <button class="modal-close" style="position:fixed;top:var(--space-3);right:var(--space-3);color:#fff;font-size:28px;" id="viewerClose">&times;</button>
  <div class="mv-viewer-title" id="viewerTitle"></div>
  <div class="mv-viewer-imgs" id="viewerImgs"></div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/image-utils.js"></script>
<script src="./js/exercise-picker.js"></script>
<script src="./js/routine-manager.js"></script>
<script src="./js/session-app.js"></script>
</body>
</html>
