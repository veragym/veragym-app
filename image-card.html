<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<title>VERA GYM | 이미지 카드</title>
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/session.css">
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">이미지 카드</div>
    <div class="header-sub" id="trainerInfo"></div>
  </div>
  <button class="btn btn-sm btn-ghost" id="btnBack">← 돌아가기</button>
</div>

<!-- 입력 영역 -->
<div style="padding:var(--space-4);">
  <div class="field">
    <label class="field-label">회원 이름</label>
    <input class="field-input" id="igMember" placeholder="홍길동">
  </div>
  <div class="field">
    <label class="field-label">프로그램명</label>
    <input class="field-input" id="igProgram" placeholder="상체 집중 프로그램">
  </div>
</div>

<!-- 운동 검색 -->
<div style="padding:0 var(--space-4);">
  <div class="search-bar mb-3">
    <input class="field-input" id="igSearch" placeholder="운동 검색">
    <button class="search-clear" id="igSearchClear">&times;</button>
  </div>
  <div id="igResults" style="display:none;" class="ig-results"></div>
</div>

<!-- 운동 목록 -->
<div id="igExList" style="padding:0 var(--space-4);"></div>

<!-- 하단 액션 -->
<div class="bottom-actions">
  <button class="btn btn-md btn-ghost" id="btnLoadRoutine" style="flex:1;">루틴 불러오기</button>
  <button class="btn btn-md btn-primary" id="btnGenSave" style="flex:1;">이미지 저장</button>
  <button class="btn btn-md btn-secondary" id="btnGenShare" style="flex:1;">공유</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/image-utils.js"></script>
<script src="./js/exercise-picker.js"></script>
<script src="./js/routine-manager.js"></script>
<script src="./js/branch-schedule.js"></script>
<script src="./js/imgcard-app.js"></script>
</body>
</html>
