<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<title>VERA GYM | 운동 라이브러리</title>
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/session.css">
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">VERA <span>GYM</span></div>
    <div class="header-sub" id="trainerInfo"></div>
  </div>
  <button class="btn btn-sm btn-ghost" id="btnLogout">Logout</button>
</div>

<!-- 돌아가기 바 -->
<div id="returnBar" style="display:none;padding:var(--space-2) var(--space-4);background:var(--accent-trainer-bg);border-bottom:1px solid var(--accent-trainer-border);">
  <button class="btn btn-sm btn-secondary" id="btnReturn">← 수업일지로 돌아가기</button>
</div>

<!-- 뷰 탭 -->
<div class="ex-sub-tabs" style="padding:var(--space-2) var(--space-4);">
  <button class="chip active" id="tabAll" data-view="all">전체</button>
  <button class="chip" id="tabMine" data-view="mine">내 운동 <span id="myCount"></span></button>
  <button class="chip" id="tabRoutine" data-view="routine">루틴</button>
</div>

<!-- 검색 + 필터 -->
<div class="ex-search-area" style="padding:var(--space-2) var(--space-4);">
  <div class="search-bar">
    <input class="field-input" id="searchInput" placeholder="운동 검색">
    <button class="search-clear" id="btnX">&times;</button>
  </div>
  <div id="toolChips" class="chips mt-2"></div>
  <div id="partChips" class="chips mt-2"></div>
</div>

<div class="ex-stat-bar" id="statBar" style="padding:var(--space-1) var(--space-4);"></div>
<div id="exList" style="padding:0 var(--space-4);"></div>

<!-- 루틴 섹션 -->
<div id="routineSection" style="display:none;padding:var(--space-4);">
  <div class="sec-header">
    <span class="sec-title">내 루틴</span>
    <button class="btn btn-sm btn-primary" id="btnNewRoutine">만들기</button>
  </div>
  <div id="routineList"></div>
</div>

<!-- 운동 상세 모달 -->
<div class="ex-modal-bg" id="exModal">
  <div class="ex-modal" id="exModalContent">
    <div id="exModalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/exercise-picker.js"></script>
<script src="./js/routine-manager.js"></script>
<script src="./js/exlib-app.js"></script>
</body>
</html>
