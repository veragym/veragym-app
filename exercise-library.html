<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐">
<meta name="theme-color" content="#c9a84c">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베라짐 | 운동 라이브러리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #0f0f0a; color: #fff;
    min-height: 100dvh; padding-bottom: 80px;
  }

  /* ─── 헤더 ─── */
  .header {
    background: #0d1525; border-bottom: 1px solid #1e3a5f44;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .btn-back { background: none; border: none; color: #3b82f6; font-size: 22px; cursor: pointer; padding: 0; line-height: 1; }
  .header h1 { font-size: 16px; font-weight: 800; flex: 1; }
  .header-badge {
    background: #3b82f622; color: #60a5fa;
    border: 1px solid #3b82f644;
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; font-weight: 600;
  }

  /* ─── 검색 + 필터 ─── */
  .search-area {
    padding: 14px 16px 0;
    position: sticky; top: 57px; z-index: 90;
    background: #080e1a;
  }
  .search-wrap { position: relative; margin-bottom: 12px; }
  .ex-search {
    width: 100%; background: #161610; border: 1.5px solid #2a2518;
    border-radius: 10px; padding: 11px 40px 11px 14px;
    font-size: 14px; color: #fff; outline: none; font-family: inherit;
    transition: border-color 0.2s; display: block;
  }
  .ex-search:focus { border-color: #c9a84c66; }
  .ex-search::placeholder { color: #444; }
  .btn-x {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #555; font-size: 16px;
    cursor: pointer; padding: 0; line-height: 1; display: none;
  }

  /* 필터 칩 */
  .filter-row { margin-bottom: 10px; }
  .filter-label { font-size: 10px; color: #555; letter-spacing: 1.2px; margin-bottom: 6px; font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    background: #161610; border: 1.5px solid #2a2518;
    border-radius: 20px; padding: 5px 13px;
    font-size: 12px; color: #666; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; font-family: inherit;
  }
  .chip:hover { border-color: #c9a84c55; color: #aaa; }
  .chip.active { background: #c9a84c22; border-color: #c9a84c88; color: #c9a84c; font-weight: 700; }

  /* ─── 뷰 탭 ─── */
  .view-tabs {
    display: flex; border-bottom: 1px solid #2a2518;
    padding: 0 16px;
  }
  .view-tab {
    flex: 1; padding: 11px 0; text-align: center;
    font-size: 13px; font-weight: 600; color: #555;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .view-tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }

  /* ─── 통계 바 ─── */
  .stat-bar { padding: 10px 16px; font-size: 12px; color: #555; }
  .stat-bar span { color: #c9a84c99; font-weight: 700; }

  /* ─── 운동 카드 (admin.html 스타일 기반) ─── */
  .ex-list { padding: 0 16px; }
  .ex-card {
    background: #161610; border: 1px solid #2a2518;
    border-radius: 10px; padding: 12px 14px; margin-bottom: 7px;
  }
  .ex-card-row { display: flex; align-items: center; gap: 12px; }
  .ex-thumb {
    width: 52px; height: 52px; border-radius: 8px;
    background: #1a1a12; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden;
  }
  .ex-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 600; }
  .ex-en { font-size: 11px; color: #555; margin-top: 2px; }
  .ex-tags { margin-top: 5px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .ex-tag-tool { background: #c9a84c18; border: 1px solid #c9a84c33; border-radius: 6px; padding: 2px 8px; font-size: 10px; color: #c9a84c99; }
  .ex-tag-part { background: transparent; border: 1px solid #2a2518; border-radius: 6px; padding: 2px 8px; font-size: 10px; color: #555; }
  .ex-tag-cnt  { font-size: 10px; color: #3d3d2d; }

  /* 버튼 영역 */
  .ex-btns { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .btn-fav {
    background: none; border: none; font-size: 20px; cursor: pointer;
    color: #333; padding: 2px; line-height: 1;
    transition: color 0.15s, transform 0.15s;
  }
  .btn-fav.active { color: #c9a84c; }
  .btn-fav:active { transform: scale(1.3); }

  .btn-add {
    background: #c9a84c22; border: 1px solid #c9a84c44;
    border-radius: 8px; padding: 6px 10px;
    font-size: 11px; font-weight: 700; color: #c9a84c;
    cursor: pointer; white-space: nowrap; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-add:hover { background: #c9a84c33; border-color: #c9a84c88; }
  .btn-add.added {
    background: transparent; border-color: #2a2518; color: #444; cursor: default;
  }
  .btn-add.added:hover { background: transparent; border-color: #2a2518; color: #444; }

  /* 더 보기 */
  .btn-more {
    width: 100%; background: #161610; border: 1px solid #2a2518;
    border-radius: 10px; padding: 12px; color: #666; font-size: 13px;
    cursor: pointer; margin: 4px 0; font-family: inherit; transition: all 0.15s;
  }
  .btn-more:hover { border-color: #c9a84c44; color: #c9a84c; }

  /* 로딩 / 빈 상태 */
  .empty { text-align: center; padding: 60px 20px; color: #444; font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: #555; font-size: 14px; }



  /* 토스트 */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #2a2518; color: #c9a84c; border: 1px solid #c9a84c44;
    padding: 10px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s;
    z-index: 999; white-space: nowrap; pointer-events: none;
  }
</style>
</head>
<body>
<div id="toast"></div>

<!-- 헤더 -->
<div class="header">
  <button class="btn-back" onclick="history.back()">←</button>
  <h1>운동 라이브러리</h1>
  <div class="header-badge" id="myCount">내 목록 0</div>
</div>

<!-- 검색 + 필터 -->
<div class="search-area">
  <div class="search-wrap">
    <input type="text" class="ex-search" id="searchInput"
           placeholder="운동명 검색 (한/영)" oninput="onSearch()" autocomplete="off">
    <button class="btn-x" id="btnX" onclick="clearSearch()">✕</button>
  </div>

  <!-- 도구 필터 -->
  <div class="filter-row">
    <div class="filter-label">TOOL</div>
    <div class="chips" id="toolChips"></div>
  </div>

  <!-- 부위 필터 -->
  <div class="filter-row" style="margin-bottom:12px">
    <div class="filter-label">부위</div>
    <div class="chips" id="partChips"></div>
  </div>
</div>

<!-- 뷰 탭 -->
<div class="view-tabs">
  <div class="view-tab active" id="tabAll"  onclick="switchView('all')">전체 운동</div>
  <div class="view-tab"        id="tabMine" onclick="switchView('mine')">내 수업 목록</div>
</div>

<div class="stat-bar" id="statBar"></div>

<!-- 운동 목록 -->
<div class="ex-list" id="exList">
  <div class="loading">운동 목록 불러오는 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
init_db();

// ─── 상태 ───
let trainer     = null;
let allExs      = [];
let myLibIds    = new Set();
let favIds      = new Set();
let useCountMap = {};
let curView     = 'all';
let filterTool  = '';
let filterPart  = '';
let showCount   = 50;
let searchTm    = null;

const TOOLS = ['전체','체중','덤벨','바벨','케이블','밴드','케틀벨','머신','소도구','핀 머신','플레이트 머신','스미스머신'];
const PARTS = ['전체','가슴','등','어깨','팔','코어','하체','전신'];

// ─── 초기화 ───
async function init() {
  trainer = await requireTrainer();
  if (!trainer) return;
  await Promise.all([loadAllExercises(), loadMyLib()]);
  buildFilters();
  renderList();
}

// ─── 전체 운동 DB 로드 ───
async function loadAllExercises() {
  const { data, error } = await db
    .from('exercise_refs')
    .select('id,name_ko,name_en,part_unified,tool_unified,image_url')
    .eq('is_active', true)
    .order('name_ko', { ascending: true })
    .limit(2000);
  if (error) {
    console.error('운동 DB 오류:', error.message);
    document.getElementById('exList').innerHTML =
      `<div class="empty">
        <div class="empty-icon">⚠️</div>
        <div>운동 DB를 불러오지 못했어요</div>
        <div style="font-size:11px;color:#444;margin-top:6px;">${error.message}</div>
        <button onclick="retryInit()" style="margin-top:16px;background:#c9a84c22;border:1px solid #c9a84c44;color:#c9a84c;padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;">다시 시도</button>
      </div>`;
    return;
  }
  allExs = data || [];
}

// ─── 내 운동 목록 로드 ───
async function loadMyLib() {
  const { data, error } = await db
    .from('trainer_exercises')
    .select('exercise_ref_id,is_favorite,use_count')
    .eq('trainer_id', trainer.id);
  if (error) console.error('내 목록 오류:', error.message);
  myLibIds    = new Set((data||[]).map(r => r.exercise_ref_id));
  favIds      = new Set((data||[]).filter(r => r.is_favorite).map(r => r.exercise_ref_id));
  useCountMap = Object.fromEntries((data||[]).map(r => [r.exercise_ref_id, r.use_count||0]));
  document.getElementById('myCount').textContent = `내 목록 ${myLibIds.size}`;
}

// ─── 필터 칩 생성 ───
function buildFilters() {
  const makeChips = (elId, arr, curSel, fn) => {
    document.getElementById(elId).innerHTML = arr.map(v => {
      const isActive = (curSel === v) || (!curSel && v === '전체');
      return `<button class="chip${isActive?' active':''}" onclick="${fn}('${v}')">${v}</button>`;
    }).join('');
  };
  makeChips('toolChips', TOOLS, filterTool || '전체', 'setTool');
  makeChips('partChips', PARTS, filterPart || '전체', 'setPart');
}

function setTool(v) { filterTool = (v === '전체') ? '' : v; buildFilters(); showCount = 50; renderList(); }
function setPart(v) { filterPart = (v === '전체') ? '' : v; buildFilters(); showCount = 50; renderList(); }

// ─── 검색 ───
function onSearch() {
  const val = document.getElementById('searchInput').value;
  document.getElementById('btnX').style.display = val ? '' : 'none';
  clearTimeout(searchTm);
  searchTm = setTimeout(() => { showCount = 50; renderList(); }, 150);
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('btnX').style.display = 'none';
  showCount = 50; renderList();
}

// ─── 뷰 전환 ───
function switchView(v) {
  curView = v;
  document.getElementById('tabAll').classList.toggle('active',  v === 'all');
  document.getElementById('tabMine').classList.toggle('active', v === 'mine');
  showCount = 50; renderList();
}

// ─── 목록 렌더 ───
function renderList() {
  const wrap = document.getElementById('exList');
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();

  let list = allExs;
  if (curView === 'mine') list = list.filter(e => myLibIds.has(e.id));
  if (filterTool) list = list.filter(e => e.tool_unified === filterTool);
  if (filterPart) list = list.filter(e => e.part_unified === filterPart);
  if (q) list = list.filter(e =>
    (e.name_ko||'').toLowerCase().includes(q) ||
    (e.name_en||'').toLowerCase().includes(q)
  );

  // 정렬: 즐겨찾기 → use_count → 내 목록 → 나머지
  list = [...list].sort((a, b) => {
    const aM   = myLibIds.has(a.id) ? 0 : 1;
    const bM   = myLibIds.has(b.id) ? 0 : 1;
    const aFav = favIds.has(a.id)   ? 0 : 1;
    const bFav = favIds.has(b.id)   ? 0 : 1;
    const aC   = useCountMap[a.id]  || 0;
    const bC   = useCountMap[b.id]  || 0;
    if (aM   !== bM)   return aM   - bM;
    if (aFav !== bFav) return aFav - bFav;
    if (bC   !== aC)   return bC   - aC;
    return 0;
  });

  const total = allExs.length;
  document.getElementById('statBar').innerHTML =
    `<span>${list.length}</span>${list.length === total ? '개 운동' : `개 / 전체 ${total}개`}`;

  if (!list.length) {
    wrap.innerHTML = `<div class="empty">해당하는 운동이 없어요</div>`;
    return;
  }

  const items = list.slice(0, showCount);
  wrap.innerHTML = items.map(ex => {
    const isMine = myLibIds.has(ex.id);
    const isFav  = favIds.has(ex.id);
    const cnt    = useCountMap[ex.id] || 0;
    const thumb  = ex.image_url
      ? `<div class="ex-thumb"><img src="${ex.image_url}" loading="lazy" onerror="this.parentElement.innerHTML=''"></div>`
      : `<div class="ex-thumb"></div>`;
    return `
      <div class="ex-card">
        <div class="ex-card-row">
          ${thumb}
          <div class="ex-info">
            <div class="ex-name">${ex.name_ko || ex.name_en}</div>
            ${(ex.name_en && ex.name_en !== ex.name_ko) ? `<div class="ex-en">${ex.name_en}</div>` : ''}
            <div class="ex-tags">
              ${ex.tool_unified ? `<span class="ex-tag-tool">${ex.tool_unified}</span>` : ''}
              ${ex.part_unified ? `<span class="ex-tag-part">${ex.part_unified}</span>` : ''}
              ${cnt > 0 ? `<span class="ex-tag-cnt">${cnt}회 사용</span>` : ''}
            </div>
          </div>
          <div class="ex-btns">
            <button class="btn-fav ${isFav ? 'active' : ''}"
                    onclick="toggleFavorite('${ex.id}',${isFav})">${isFav ? '★' : '☆'}</button>
            <button class="btn-add ${isMine ? 'added' : ''}"
                    onclick="toggleUse('${ex.id}',${isMine})">
              ${isMine ? '✓ 추가됨' : '＋ 추가'}
            </button>
          </div>
        </div>
      </div>`;
  }).join('') +
  (list.length > showCount
    ? `<button class="btn-more" onclick="loadMore()">더 보기 (${list.length - showCount}개 남음)</button>`
    : '');
}

function loadMore() { showCount += 50; renderList(); }

// ─── 내 운동으로 추가 / 제거 ───
async function toggleUse(refId, isMine) {
  if (isMine) {
    if (!confirm('내 수업 목록에서 제거할까요?')) return;
    const { error } = await db.from('trainer_exercises')
      .delete().eq('trainer_id', trainer.id).eq('exercise_ref_id', refId);
    if (error) { showToast('오류: ' + error.message); return; }
    myLibIds.delete(refId); favIds.delete(refId);
    showToast('목록에서 제거됨');
  } else {
    const { error } = await db.from('trainer_exercises')
      .insert({ trainer_id: trainer.id, exercise_ref_id: refId });
    if (error) { showToast('오류: ' + error.message); return; }
    myLibIds.add(refId);
    showToast('✓ 내 운동으로 추가됨');
  }
  document.getElementById('myCount').textContent = `내 목록 ${myLibIds.size}`;
  renderList();
}

// ─── 즐겨찾기 토글 ───
async function toggleFavorite(refId, isFav) {
  // 내 목록에 없으면 자동으로 추가 + 즐겨찾기
  if (!myLibIds.has(refId)) {
    const { error } = await db.from('trainer_exercises')
      .insert({ trainer_id: trainer.id, exercise_ref_id: refId, is_favorite: true });
    if (error) { showToast('오류: ' + error.message); return; }
    myLibIds.add(refId); favIds.add(refId);
    document.getElementById('myCount').textContent = `내 목록 ${myLibIds.size}`;
    showToast('즐겨찾기 & 내 목록에 추가됨');
    renderList(); return;
  }
  const newVal = !isFav;
  const { error } = await db.from('trainer_exercises')
    .update({ is_favorite: newVal })
    .eq('trainer_id', trainer.id).eq('exercise_ref_id', refId);
  if (error) { showToast('오류: ' + error.message); return; }
  if (newVal) { favIds.add(refId);    showToast('즐겨찾기 추가됨'); }
  else        { favIds.delete(refId); showToast('즐겨찾기 해제됨'); }
  renderList();
}


// ─── 토스트 ───
let _toastTm = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(_toastTm);
  _toastTm = setTimeout(() => t.style.opacity = '0', 2200);
}

// ─── bfcache 복원 처리 (iOS PWA 뒤로가기 후 재진입) ───
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    // bfcache에서 복원 — 상태 초기화 후 재로드
    allExs = []; myLibIds = new Set(); favIds = new Set(); useCountMap = {};
    filterTool = ''; filterPart = ''; showCount = 50; curView = 'all';
    document.getElementById('exList').innerHTML = '<div class="loading">운동 목록 불러오는 중...</div>';
    document.getElementById('tabAll').classList.add('active');
    document.getElementById('tabMine').classList.remove('active');
    init();
  }
});

function retryInit() {
  allExs = []; myLibIds = new Set(); favIds = new Set(); useCountMap = {};
  document.getElementById('exList').innerHTML = '<div class="loading">운동 목록 불러오는 중...</div>';
  init();
}

init();
</script>
</body>
</html>
