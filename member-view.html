<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest-member.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 회원">
<meta name="theme-color" content="#39ff14">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERA GYM | 회원</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,'Pretendard',sans-serif; background:#050f05; color:#fff; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
.icon { font-size:60px; margin-bottom:20px; }
h2 { font-size:20px; font-weight:700; margin-bottom:8px; }
h2 span { color:#39ff14; }
p { font-size:14px; color:#555; line-height:1.6; }
.badge { display:inline-block; background:#39ff1422; border:1px solid #39ff1444; border-radius:99px; color:#39ff14; font-size:12px; padding:4px 12px; margin-top:16px; }
</style>
</head>
<body>
<div class="icon">🏃</div>
<h2>회원 <span>앱</span></h2>
<p>회원 앱 기능을 준비 중입니다.<br>트레이너가 보내준 링크로 접속하면 수업 기록을 확인할 수 있습니다.</p>
<div class="badge">준비 중</div>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/veragym-app/service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
