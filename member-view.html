<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest-member.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 회원">
<meta name="theme-color" content="#3b82f6">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERA GYM | 회원</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,'Pretendard',sans-serif; background:#080e1a; color:#fff; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
.logo { font-size:20px; font-weight:900; letter-spacing:2px; margin-bottom:24px; }
.logo span { color:#3b82f6; }
h2 { font-size:18px; font-weight:700; margin-bottom:10px; }
p { font-size:13px; color:#3a5878; line-height:1.7; }
.badge { display:inline-block; background:#3b82f622; border:1px solid #3b82f644; border-radius:99px; color:#60a5fa; font-size:12px; padding:4px 14px; margin-top:18px; font-weight:600; }
</style>
</head>
<body>
<div class="logo">VERA<span>GYM</span></div>
<h2>회원 앱</h2>
<p>회원 앱 기능을 준비 중입니다.<br>트레이너가 보내준 링크로 접속하면<br>수업 기록을 확인할 수 있습니다.</p>
<div class="badge">준비 중</div>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/veragym-app/service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
