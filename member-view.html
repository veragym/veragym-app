<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22c55e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="베라짐 멤버">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>VERA GYM | 내 수업</title>
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/member.css">
</head>
<body>

<!-- ── 에러 화면 ───────────────────────────────────────────── -->
<div class="error-screen" id="errorScreen">
  <h2>접근할 수 없습니다</h2>
  <p>유효한 링크로 다시 접속해주세요</p>
</div>

<!-- ── 로딩 ────────────────────────────────────────────────── -->
<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
</div>

<!-- ── 메인 콘텐츠 ─────────────────────────────────────────── -->
<div id="mainContent" style="display:none;">

  <div class="header">
    <div>
      <div class="header-title">VERA <span>GYM</span></div>
      <div class="header-sub" id="headerSub">
        <span id="memberNameHdr"></span>
        <span id="trainerInfoHdr" style="margin-left:var(--space-2);"></span>
      </div>
    </div>
    <span id="tokenDaysHdr" style="font-size:10px;color:var(--text-tertiary);"></span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="logs">수업</button>
    <button class="tab-btn" data-tab="schedule">일정</button>
    <button class="tab-btn" data-tab="wlog">일지</button>
    <button class="tab-btn" data-tab="stats">통계</button>
    <button class="tab-btn" data-tab="exlib">운동DB</button>
    <button class="tab-btn" data-tab="anatomy">해부도</button>
  </div>

  <!-- Tab: 수업일지 -->
  <div class="tab-content active" id="tab-logs">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-label">전체</div></div>
      <div class="stat-box"><div class="stat-num" id="statMonth">0</div><div class="stat-label">이번 달</div></div>
      <div class="stat-box"><div class="stat-num" id="statExTypes">0</div><div class="stat-label">운동 종류</div></div>
    </div>
    <div id="ptBanner"></div>
    <div class="sec-header">
      <span class="sec-title">수업 기록</span>
      <span class="sec-count" id="logCount"></span>
    </div>
    <div id="sessList"></div>
  </div>

  <!-- Tab: 일정 -->
  <div class="tab-content" id="tab-schedule">
    <div class="sec-header"><span class="sec-title">PT 일정</span></div>
    <div id="schedList"></div>
  </div>

  <!-- Tab: 운동일지 (회원 작성) -->
  <div class="tab-content" id="tab-wlog">
    <div id="wlogListView">
      <div class="sec-header">
        <span class="sec-title">운동일지</span>
        <span class="sec-count" id="wlogCount"></span>
        <button class="btn btn-sm btn-primary" id="btnWlogNew">작성</button>
      </div>
      <div id="wlogList"></div>
    </div>
    <div id="wlogWriteView" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);">
        <span class="sec-title" id="wlogWriteTitle">운동일지 작성</span>
        <button class="btn btn-sm btn-ghost" id="wlogCancelBtn">취소</button>
      </div>
      <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-3);">
        <input class="field-input" id="wlogDate" type="date" style="flex:1;">
        <input class="field-input" id="wlogTitle" placeholder="제목 (선택)" style="flex:2;">
      </div>
      <div id="wlogExList"></div>
      <div class="wlog-bottom-bar">
        <button class="btn btn-md btn-secondary" id="wlogAddExBtn" style="flex:1;">운동 추가</button>
        <button class="btn btn-md btn-ghost" id="wlogLoadRoutineBtn" style="flex:1;">루틴</button>
      </div>
      <div class="field mt-3">
        <label class="field-label">메모</label>
        <textarea class="field-textarea" id="wlogNotes" rows="2" placeholder="오늘의 메모"></textarea>
      </div>
      <button class="wlog-save-btn mt-3" id="wlogSaveBtn">저장</button>
    </div>
  </div>

  <!-- Tab: 통계 -->
  <div class="tab-content" id="tab-stats">
    <div id="statsContent"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- Tab: 운동DB -->
  <div class="tab-content" id="tab-exlib">
    <div class="ex-sub-tabs">
      <button class="chip active" id="exSubBtnAll" data-ex-sub="exercise">전체</button>
      <button class="chip" id="exSubBtnMine" data-ex-sub="mine">내 운동 <span id="myExCount"></span></button>
      <button class="chip" id="exSubBtnRoutine" data-ex-sub="routine">루틴</button>
    </div>
    <div id="exSubExercise">
      <div class="ex-search-area">
        <div class="ex-search-wrap">
          <input class="ex-search-input" id="exSearchInput" placeholder="운동 검색">
          <button class="ex-btn-x" id="exBtnX">&times;</button>
        </div>
        <div id="exToolChips" class="chips mt-2"></div>
        <div id="exPartChips" class="chips mt-2"></div>
      </div>
      <div class="ex-stat-bar" id="exStatBar"></div>
      <div id="exList"></div>
    </div>
    <div id="exSubRoutine" style="display:none;">
      <div class="sec-header mt-3">
        <span class="sec-title">내 루틴</span>
        <button class="btn btn-sm btn-primary" id="rtNewBtn">만들기</button>
      </div>
      <div id="memberImportCard" style="display:none;">
        <div class="card mb-3">
          <div class="field-label mb-2">공유 링크로 루틴 가져오기</div>
          <div style="display:flex;gap:var(--space-2);">
            <input class="field-input" id="memberLinkInput" placeholder="링크 또는 코드 입력" style="flex:1;">
            <button class="btn btn-sm btn-primary" id="btnMemberImport">가져오기</button>
          </div>
        </div>
      </div>
      <div id="routineList"></div>
    </div>
  </div>

  <!-- Tab: 해부도 -->
  <div class="tab-content" id="tab-anatomy">
    <div class="anatomy-view">
      <div style="display:flex;gap:var(--space-2);justify-content:center;margin-bottom:var(--space-3);">
        <button class="btn btn-sm btn-secondary" id="btnTypeMuscle">근육</button>
        <button class="btn btn-sm btn-ghost" id="btnTypeBone">골격</button>
      </div>
      <div id="anatomyMuscleViews" style="display:flex;gap:var(--space-2);justify-content:center;margin-bottom:var(--space-3);">
        <button class="btn btn-sm btn-secondary" id="btnMuscleFront">앞면</button>
        <button class="btn btn-sm btn-ghost" id="btnMuscleBack">뒷면</button>
      </div>
      <div id="anatomyBoneViews" style="display:none;display:flex;gap:var(--space-2);justify-content:center;margin-bottom:var(--space-3);">
        <button class="btn btn-sm btn-secondary" id="btnBoneFront">앞면</button>
        <button class="btn btn-sm btn-ghost" id="btnBoneSide">측면</button>
      </div>
      <img class="anatomy-img" id="anatomyImg" src="./images/anatomy/muscle-front.png" alt="해부도">
    </div>
  </div>

</div>

<!-- ── Toast ───────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── 사진 뷰어 ──────────────────────────────────────────── -->
<div class="mv-viewer-bg" id="memberPhotoViewer">
  <button class="modal-close" style="position:fixed;top:var(--space-3);right:var(--space-3);color:#fff;font-size:28px;" id="viewerCloseBtn">&times;</button>
  <div class="mv-viewer-title" id="memberViewerTitle"></div>
  <div class="mv-viewer-imgs" id="memberViewerImgs"></div>
</div>

<!-- ── 운동 상세 모달 ──────────────────────────────────────── -->
<div class="ex-modal-bg" id="exModalBg">
  <div class="ex-modal" id="exModalBody"></div>
</div>

<!-- ── 운동 피커 모달 ──────────────────────────────────────── -->
<div class="wlog-picker-bg" id="wlogPickerBg">
  <div class="wlog-picker">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);">
      <div>
        <div style="font-size:var(--text-base);font-weight:var(--font-bold);" id="pkHeaderTitle">운동 추가</div>
        <div style="font-size:var(--text-xs);color:var(--text-tertiary);" id="pkHeaderSub"></div>
      </div>
      <button class="btn btn-sm btn-ghost" id="pkCloseBtn">닫기</button>
    </div>
    <div class="ex-search-wrap mb-3">
      <input class="ex-search-input" id="wlogPickerSearch" placeholder="운동 검색">
      <button class="ex-btn-x" id="pkBtnX">&times;</button>
    </div>
    <div id="pkPartChips" class="chips mb-2"></div>
    <div id="pkToolChips" class="chips mb-2"></div>
    <div class="ex-stat-bar" id="pkStat"></div>
    <div id="wlogPickerList"></div>
  </div>
</div>

<!-- ── 루틴 피커 모달 ──────────────────────────────────────── -->
<div class="wlog-picker-bg" id="wlogRtPickerBg">
  <div class="wlog-picker">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);">
      <div style="font-size:var(--text-base);font-weight:var(--font-bold);">루틴 불러오기</div>
      <button class="btn btn-sm btn-ghost" id="rtPickerCloseBtn">닫기</button>
    </div>
    <div id="wlogRtPickerList"></div>
  </div>
</div>

<!-- ── 루틴 저장 모달 ──────────────────────────────────────── -->
<div class="modal-bg" id="wlogRtSaveBg">
  <div class="modal" style="border-radius:var(--radius-md);max-width:360px;padding:var(--space-5);">
    <div class="modal-title">루틴으로 저장</div>
    <div class="field-hint mb-3" id="wlogRtSaveInfo"></div>
    <div class="field">
      <input class="field-input" id="wlogRtSaveName" placeholder="루틴 이름">
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" id="rtSaveCancelBtn">취소</button>
      <button class="btn btn-lg btn-primary" id="rtSaveConfirmBtn">저장</button>
    </div>
  </div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/image-utils.js"></script>
<script src="./js/routine-manager.js"></script>
<script src="./js/member-app.js"></script>
</body>
</html>
