<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="베라짐 트레이너">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>VERA GYM | 트레이너</title>
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/trainer.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="header">
  <div>
    <div class="header-title">VERA <span>GYM</span></div>
    <div class="header-sub" id="trainerInfo"></div>
  </div>
  <button class="btn btn-sm btn-ghost" id="btnLogout">Logout</button>
</div>

<!-- ── Tabs ────────────────────────────────────────────────── -->
<div class="tabs">
  <button class="tab-btn active" data-tab="members">내 회원</button>
  <button class="tab-btn" data-tab="logs">수업일지</button>
  <button class="tab-btn" data-tab="schedule">일정</button>
  <button class="tab-btn" data-tab="revenue">매출</button>
  <button class="tab-btn" data-tab="requests">요청</button>
  <a class="tab-btn" href="exercise-library.html" style="text-decoration:none;">운동DB</a>
  <a class="tab-btn" href="image-card.html" style="text-decoration:none;">이미지</a>
</div>

<!-- ── Tab: 내 회원 ────────────────────────────────────────── -->
<div class="tab-content active" id="tab-members">
  <!-- 회원 목록 뷰 -->
  <div id="view-member-list">
    <div class="sec-header">
      <span class="sec-title">내 회원</span>
      <span class="sec-count" id="memberCount"></span>
    </div>
    <div id="memberList"></div>
  </div>
  <!-- 회원 상세 뷰 -->
  <div id="view-member-detail" style="display:none;">
    <button class="btn btn-sm btn-ghost mb-3" id="btnBackToList">← 목록</button>
    <div class="sec-title" id="detailName"></div>
    <div class="card-sub mb-3" id="detailSub"></div>
    <div id="detailTokenBox" class="mb-3"></div>
    <div class="sec-header mt-4">
      <span class="sec-title" style="font-size:var(--text-sm)">수업 기록</span>
    </div>
    <div id="memberLogs"></div>
    <div class="sec-header mt-4">
      <span class="sec-title" style="font-size:var(--text-sm)">회원 운동일지</span>
    </div>
    <div id="memberSelfLogs"></div>
  </div>
</div>

<!-- ── Tab: 수업일지 ──────────────────────────────────────── -->
<div class="tab-content" id="tab-logs">
  <div class="sec-header">
    <span class="sec-title">수업일지</span>
    <span class="sec-count" id="logCount"></span>
  </div>
  <div id="logList"></div>
</div>

<!-- ── Tab: 일정 ──────────────────────────────────────────── -->
<div class="tab-content" id="tab-schedule">
  <div class="cal-controls">
    <button class="btn btn-sm btn-ghost" id="calPrev">‹</button>
    <span class="cal-range" id="calRange"></span>
    <button class="btn btn-sm btn-ghost" id="calNext">›</button>
    <button class="btn btn-sm btn-secondary" id="btnBranchSched" style="margin-left:auto;">전체 시간표</button>
  </div>
  <div class="cal-wrap">
    <div id="calDateRow" class="cal-date-row"></div>
    <div id="calGridScroll" class="cal-grid-scroll">
      <div id="calGrid" class="cal-grid"></div>
    </div>
  </div>
</div>

<!-- ── Tab: 매출관리 ──────────────────────────────────────── -->
<div class="tab-content" id="tab-revenue">
  <!-- 평균 매출 -->
  <div class="card mb-3">
    <div class="card-sub mb-2">전체 평균 매출</div>
    <div class="stat-num" id="revAvgAll">0원</div>
  </div>
  <div style="display:flex; gap:var(--space-2); margin-bottom:var(--space-3);">
    <select class="field-select" id="revYear"></select>
    <select class="field-select" id="revPeriodType">
      <option value="year">연도</option>
      <option value="half">반기</option>
      <option value="quarter">분기</option>
    </select>
    <select class="field-select" id="revPeriodSub" style="display:none;"></select>
  </div>
  <div class="card mb-4">
    <div class="card-sub mb-2">기간 평균 매출</div>
    <div class="stat-num" id="revAvgPeriod">0원</div>
  </div>

  <div class="divider"></div>

  <!-- 목표/달성/예상 -->
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-2); margin-bottom:var(--space-3);">
    <div class="stat-box">
      <div class="stat-label">목표</div>
      <input class="field-input" id="revTargetInput" type="number" placeholder="0" style="text-align:center;font-weight:700;">
    </div>
    <div class="stat-box">
      <div class="stat-label">예상</div>
      <div class="stat-num" id="revForecastTotal">0원</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">달성</div>
      <div class="stat-num" id="revAchieved" style="color:var(--color-success);">0원</div>
    </div>
  </div>

  <!-- 예상매출 목록 -->
  <div class="sec-header">
    <span class="sec-title">예상매출</span>
    <div style="display:flex;gap:var(--space-1);margin-left:auto;">
      <button class="btn btn-sm btn-secondary" id="revMonthCur">이번 달</button>
      <button class="btn btn-sm btn-ghost" id="revMonthNext">다음 달</button>
    </div>
  </div>
  <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-3);">
    <button class="btn btn-sm btn-primary" id="btnAddForecast">등록</button>
    <button class="btn btn-sm btn-ghost" id="btnCopyForecast">복사</button>
  </div>
  <div id="revForecastList"></div>
</div>

<!-- ── Tab: 요청사항 ──────────────────────────────────────── -->
<div class="tab-content" id="tab-requests">
  <div class="sec-header">
    <span class="sec-title">요청사항</span>
    <span class="sec-count" id="reqCount"></span>
    <button class="btn btn-sm btn-primary" id="btnAddReq">요청 추가</button>
  </div>
  <div id="reqList"></div>
</div>

<!-- ── Write Bar (회원 상세에서만 표시) ─────────────────────── -->
<div class="write-bar" id="writeBar" style="display:none;">
  <button class="btn btn-lg btn-primary btn-block" id="btnWriteSession">수업일지 작성</button>
</div>

<!-- ── Toast ───────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── Modals ──────────────────────────────────────────────── -->

<!-- 일정 추가/수정 -->
<div class="modal-bg" id="schedModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="schedModalTitle">일정 추가</div>
    <div class="err-box" id="schedModalErr"></div>
    <div class="field">
      <label class="field-label">날짜</label>
      <input class="field-input" id="schedDate" type="date">
    </div>
    <div class="field">
      <label class="field-label">시작 시간</label>
      <input class="field-input" id="schedStart" type="time">
      <div class="field-hint" id="schedStartLabel"></div>
    </div>
    <div class="field">
      <label class="field-label">종료 시간</label>
      <input class="field-input" id="schedEnd" type="time">
      <div class="field-hint" id="schedEndDisplay"></div>
    </div>
    <div class="field">
      <label class="field-label">유형</label>
      <select class="field-select" id="schedType">
        <option value="PT">PT</option>
        <option value="SPT">SPT</option>
        <option value="업무">업무</option>
        <option value="청소">청소</option>
        <option value="홍보">홍보</option>
        <option value="식사">식사</option>
      </select>
    </div>
    <div class="field" id="schedMemberRow">
      <label class="field-label">회원</label>
      <select class="field-select" id="schedMember"></select>
    </div>
    <div class="field" id="schedMemberTextRow" style="display:none;">
      <label class="field-label">대상</label>
      <input class="field-input" id="schedMemberText" placeholder="이름/설명">
    </div>
    <div class="field" id="schedNotesRow">
      <label class="field-label" id="schedNotesLabel">메모</label>
      <textarea class="field-textarea" id="schedNotes" rows="2"></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" id="schedCancelBtn">취소</button>
      <button class="btn btn-lg btn-danger" id="schedDeleteBtn" style="display:none;">삭제</button>
      <button class="btn btn-lg btn-primary" id="schedSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- 일정 상세/액션 -->
<div class="modal-bg" id="schedInfoModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="siMember"></div>
    <div id="siStatus"></div>
    <div id="siDateTime" class="card-sub mt-2"></div>
    <div id="siType" class="card-sub"></div>
    <div id="siSessionRow" style="display:none;">
      <span class="badge badge-accent" id="siSession"></span>
    </div>
    <div class="err-box" id="siErr" style="display:none;"></div>
    <div id="siActions" class="mt-3"></div>
  </div>
</div>

<!-- 수업일지 연결 -->
<div class="modal-bg" id="linkLogModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">수업일지 연결</div>
    <div class="card-sub mb-3" id="linkLogSubtitle"></div>
    <div id="linkLogList"></div>
    <div class="btn-group mt-3">
      <button class="btn btn-lg btn-ghost" id="linkLogSkipBtn">나중에</button>
      <button class="btn btn-lg btn-primary" id="linkLogWriteBtn">새로 작성</button>
    </div>
  </div>
</div>

<!-- 예상매출 등록/수정 -->
<div class="modal-bg" id="forecastModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="forecastModalTitle">예상매출 등록</div>
    <div class="err-box" id="forecastErr"></div>
    <div class="field">
      <label class="field-label">회원/이름</label>
      <input class="field-input" id="fcName" placeholder="회원 이름">
    </div>
    <div class="field">
      <label class="field-label">회당 금액</label>
      <input class="field-input" id="fcPPS" type="number" placeholder="50000">
    </div>
    <div class="field">
      <label class="field-label">횟수</label>
      <input class="field-input" id="fcCount" type="number" placeholder="12">
    </div>
    <div class="field">
      <label class="field-label">예상 금액</label>
      <input class="field-input" id="fcAmount" type="number" readonly>
    </div>
    <div class="field">
      <label class="field-label">예상 결제일</label>
      <input class="field-input" id="fcDueDate" type="date">
    </div>
    <div class="field">
      <label class="field-label">메모</label>
      <textarea class="field-textarea" id="fcMemo" rows="2"></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('forecastModal')">취소</button>
      <button class="btn btn-lg btn-primary" id="btnSaveForecast">등록</button>
    </div>
  </div>
</div>

<!-- 요청사항 추가 -->
<div class="modal-bg" id="addReqModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">요청사항</div>
    <div class="err-box" id="reqErr"></div>
    <div class="field">
      <label class="field-label">유형</label>
      <select class="field-select" id="reqType">
        <option value="db_add">운동 DB 추가</option>
        <option value="bug_report">버그 리포트</option>
        <option value="other">기타</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">내용</label>
      <textarea class="field-textarea" id="reqContent" rows="4" placeholder="요청 내용을 입력하세요"></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('addReqModal')">취소</button>
      <button class="btn btn-lg btn-primary" id="btnSaveReq">등록</button>
    </div>
  </div>
</div>

<!-- 전체 시간표 (Canvas) -->
<div class="modal-bg" id="branchSchedModal" style="align-items:center;">
  <div class="modal" style="border-radius:var(--radius-md);max-height:95dvh;">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3);">
      <div>
        <div class="modal-title" style="margin-bottom:2px;">전체 시간표</div>
        <div class="card-sub" id="bsSubtitle"></div>
      </div>
      <button class="btn btn-sm btn-ghost" id="bsCloseBtn">닫기</button>
    </div>
    <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-3);">
      <button class="btn btn-sm btn-secondary" id="bsBtnToday">오늘</button>
      <button class="btn btn-sm btn-ghost" id="bsBtnTomorrow">내일</button>
      <input type="date" id="bsDatePicker" class="field-input" style="flex:1;">
    </div>
    <div id="bsCanvasWrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
      <canvas id="bsCanvas"></canvas>
    </div>
    <button class="btn btn-md btn-primary btn-block mt-3" id="btnDownloadBs">이미지 저장</button>
  </div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/data-loader.js"></script>
<script src="./js/image-utils.js"></script>
<script src="./js/schedule-actions.js"></script>
<script src="./js/branch-schedule.js"></script>
<script src="./js/trainer-app.js"></script>
</body>
</html>
