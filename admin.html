<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#b8942f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="베라짐 관리자">
<link rel="manifest" href="./manifest-admin.json">
<link rel="apple-touch-icon" href="./icons/icon-admin-192.png">
<title>VERA GYM | 관리자</title>
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/admin.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="header">
  <div>
    <div class="header-title">VERA <span>GYM</span> 관리자</div>
    <div class="header-sub" id="adminName"></div>
  </div>
  <button class="btn btn-sm btn-ghost" id="btnLogout">Logout</button>
</div>

<!-- ── Tabs ────────────────────────────────────────────────── -->
<div class="tabs">
  <button class="tab-btn active" data-tab="trainers">트레이너</button>
  <button class="tab-btn" data-tab="members">회원</button>
  <button class="tab-btn" data-tab="schedule">일정</button>
  <button class="tab-btn" data-tab="revenue">매출</button>
  <button class="tab-btn" data-tab="requests">요청</button>
  <button class="tab-btn" data-tab="exercise">운동DB</button>
</div>

<!-- ── Tab: 트레이너 ──────────────────────────────────────── -->
<div class="tab-content active" id="tab-trainers">
  <div class="sec-header">
    <span class="sec-title">트레이너 관리</span>
    <span class="sec-count" id="trainerCount"></span>
    <button class="btn btn-sm btn-primary" id="btnAddTrainer">추가</button>
  </div>
  <div id="trainerList"></div>
</div>

<!-- ── Tab: 회원 ──────────────────────────────────────────── -->
<div class="tab-content" id="tab-members">
  <div class="sec-header">
    <span class="sec-title">전체 회원</span>
    <span class="sec-count" id="memberCount"></span>
    <button class="btn btn-sm btn-primary" id="btnAddMember">추가</button>
  </div>
  <div class="search-bar">
    <input class="field-input" id="memberSearchInput" type="text" placeholder="회원 이름 검색">
    <button class="search-clear" id="memberSearchClear">&times;</button>
  </div>
  <div id="branchSummary"></div>
  <div id="memberBreadcrumb"></div>
  <div id="memberList"></div>
</div>

<!-- ── Tab: 일정 ──────────────────────────────────────────── -->
<div class="tab-content" id="tab-schedule">
  <div class="sc-ctrl">
    <select class="field-select sc-branch-sel" id="scBranchSel"></select>
    <div class="sc-nav">
      <button class="btn btn-sm btn-ghost sc-nav-btn" id="scPrev">‹</button>
      <span class="sc-range" id="scRange"></span>
      <button class="btn btn-sm btn-ghost sc-nav-btn" id="scNext">›</button>
    </div>
  </div>
  <div id="scDatePills" class="sc-date-pills"></div>
  <div id="scDayView" class="sc-day-view"></div>
</div>

<!-- ── Tab: 매출 ──────────────────────────────────────────── -->
<div class="tab-content" id="tab-revenue">
  <div class="rev-sub-tabs">
    <button class="chip active" data-rev-sub="forecast">예상매출</button>
    <button class="chip" data-rev-sub="payments">결제내역</button>
    <button class="chip" data-rev-sub="stats">통계</button>
  </div>

  <div id="revSub-forecast" class="rev-sub-panel active">
    <div class="rev-controls">
      <select class="field-select" id="revGymSelect"></select>
      <div class="rev-month-btns">
        <button class="btn btn-sm btn-secondary" id="adminRevCur">이번 달</button>
        <button class="btn btn-sm btn-ghost" id="adminRevNext">다음 달</button>
      </div>
    </div>
    <div class="rev-summary">
      <div class="stat-box">
        <div class="stat-label">예상매출</div>
        <div class="stat-num" id="adminRevForecast">0원</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">달성매출</div>
        <div class="stat-num" id="adminRevAchieved">0원</div>
      </div>
    </div>
    <div id="adminRevTrainerList"></div>
  </div>

  <div id="revSub-payments" class="rev-sub-panel">
    <div class="pay-filters">
      <select class="field-select" id="payMonthSel"></select>
      <select class="field-select" id="payTrainerSel"></select>
      <input class="field-input" id="paySearchInput" type="text" placeholder="회원 검색">
    </div>
    <div class="pay-summary">
      <div class="stat-box"><div class="stat-label">건수</div><div class="stat-num" id="payTotalCount">0</div></div>
      <div class="stat-box"><div class="stat-label">총액</div><div class="stat-num" id="payTotalAmt">0원</div></div>
      <div class="stat-box"><div class="stat-label">순매출</div><div class="stat-num" id="payTotalNet">0원</div></div>
    </div>
    <div id="payListWrap"></div>
  </div>

  <div id="revSub-stats" class="rev-sub-panel">
    <select class="field-select" id="statPeriodSel"></select>
    <div id="statMonthChart"></div>
    <div id="statTrainerRank"></div>
    <div id="statKeyMetrics"></div>
  </div>
</div>

<!-- ── Tab: 요청 ──────────────────────────────────────────── -->
<div class="tab-content" id="tab-requests">
  <div class="sec-header">
    <span class="sec-title">트레이너 요청사항</span>
    <span class="sec-count" id="reqCount"></span>
  </div>
  <div id="reqList"></div>
</div>

<!-- ── Tab: 운동DB ────────────────────────────────────────── -->
<div class="tab-content" id="tab-exercise">
  <div class="ex-search-area">
    <div class="search-bar">
      <input class="field-input" id="exSearch" type="text" placeholder="운동 검색">
      <button class="search-clear" id="exClear">&times;</button>
    </div>
    <div id="toolFilter" class="chips"></div>
    <div id="partFilter" class="chips mt-2"></div>
  </div>
  <div class="ex-stat-bar" id="exStatBar"></div>
  <div id="exerciseList"></div>
</div>

<!-- ── Toast ───────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── Modals ──────────────────────────────────────────────── -->

<!-- 트레이너 추가 -->
<div class="modal-bg" id="addModal" onclick="closeModal('addModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">트레이너 추가</div>
    <div class="err-box" id="addErr"></div>
    <div class="field">
      <label class="field-label">이름</label>
      <input class="field-input" id="tName" placeholder="트레이너 이름">
    </div>
    <div class="field">
      <label class="field-label">비밀번호</label>
      <input class="field-input" id="tPw" type="password" placeholder="4자 이상">
    </div>
    <div class="field">
      <label class="field-label">지점</label>
      <select class="field-select" id="tGym">
        <option value="미사점">미사점</option>
        <option value="동탄점">동탄점</option>
      </select>
    </div>
    <div class="field" id="roleField">
      <label class="field-label">권한</label>
      <select class="field-select" id="tRole">
        <option value="trainer">트레이너</option>
        <option value="admin">관리자</option>
      </select>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-lg btn-primary" id="btnAdd">추가</button>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 -->
<div class="modal-bg" id="changePwModal" onclick="closeModal('changePwModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="changePwTitle">비밀번호 변경</div>
    <div class="err-box" id="changePwErr"></div>
    <div class="field">
      <label class="field-label">새 비밀번호</label>
      <input class="field-input" id="newPw" type="password" placeholder="8자 이상, 영문+숫자">
      <div class="field-hint">최소 8자, 영문과 숫자를 포함해야 합니다</div>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('changePwModal')">취소</button>
      <button class="btn btn-lg btn-primary" id="btnChangePw">변경</button>
    </div>
  </div>
</div>

<!-- 회원 추가 -->
<div class="modal-bg" id="addMemberModal" onclick="closeModal('addMemberModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">회원 추가</div>
    <div class="err-box" id="memberErr"></div>
    <div class="field">
      <label class="field-label">이름 <span style="color:var(--color-danger)">*</span></label>
      <input class="field-input" id="mName" placeholder="회원 이름">
      <div class="field-hint" id="mNameHint"></div>
    </div>
    <div class="field" id="mSuffixField" style="display:none;">
      <label class="field-label">구분 접미사</label>
      <input class="field-input" id="mSuffix" placeholder="예: (A)">
    </div>
    <div class="field">
      <label class="field-label">지점 <span style="color:var(--color-danger)">*</span></label>
      <select class="field-select" id="mGym">
        <option value="미사점">미사점</option>
        <option value="동탄점">동탄점</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">담당 트레이너 <span style="color:var(--color-danger)">*</span></label>
      <select class="field-select" id="mTrainer"></select>
    </div>
    <div class="field">
      <label class="field-label">메모</label>
      <textarea class="field-textarea" id="mNotes" rows="2" placeholder="특이사항"></textarea>
    </div>
    <div class="divider"></div>
    <div class="field-hint mb-3">PT 상품 정보 (선택)</div>
    <div class="field">
      <label class="field-label">계약 트레이너</label>
      <select class="field-select" id="mContractTrainer"></select>
    </div>
    <div class="field">
      <label class="field-label">계약일</label>
      <input class="field-input" id="mContractDate" type="date">
    </div>
    <div class="field">
      <label class="field-label">총 횟수</label>
      <input class="field-input" id="mSessions" type="number" min="1" placeholder="12">
    </div>
    <div class="field">
      <label class="field-label">회당 금액</label>
      <input class="field-input" id="mPricePerSession" type="number" placeholder="50000">
    </div>
    <div class="field">
      <label class="field-label">결제 금액 (부가세 포함)</label>
      <input class="field-input" id="mPaymentAmount" type="number" placeholder="자동 계산">
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('addMemberModal')">취소</button>
      <button class="btn btn-lg btn-primary" id="btnAddMember">추가</button>
    </div>
  </div>
</div>

<!-- 회원 상세 -->
<div class="modal-bg" id="memberDetailModal" onclick="closeModal('memberDetailModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="detailMemberName"></div>
    <div class="card-sub" id="detailMemberMeta"></div>
    <div class="divider"></div>
    <!-- 상태 오버라이드 -->
    <div class="field">
      <label class="field-label">회원 상태</label>
      <div style="display:flex; gap:8px; align-items:center;">
        <select class="field-select" id="statusOverrideSelect" style="flex:1;">
          <option value="">자동</option>
          <option value="active">활성</option>
          <option value="long_absent">장기미방문</option>
          <option value="expired">만료</option>
        </select>
        <button class="btn btn-sm btn-secondary" id="statusOverrideBtn">변경</button>
      </div>
      <div class="field-hint" id="statusOverrideNote"></div>
    </div>
    <!-- 토큰 관리 -->
    <div class="field">
      <label class="field-label">회원 앱 접근</label>
      <div style="display:flex; gap:8px; align-items:center;">
        <span class="badge" id="tokenStatusBadge"></span>
        <span class="field-hint" id="tokenExpiryText" style="flex:1;margin:0;"></span>
      </div>
      <div style="display:flex; gap:8px; margin-top:8px;" id="tokenToggleBtn"></div>
    </div>
    <div class="divider"></div>
    <!-- PT 상품 목록 -->
    <div class="sec-header">
      <span class="sec-title">PT 상품</span>
      <button class="btn btn-sm btn-primary" id="btnAddPtFromDetail">추가</button>
    </div>
    <div id="ptProductList"></div>
  </div>
</div>

<!-- PT 상품 추가 -->
<div class="modal-bg" id="addPtModal" onclick="closeModal('addPtModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addPtTitle">PT 상품 추가</div>
    <div class="err-box" id="ptErr"></div>
    <div class="field">
      <label class="field-label">계약일 <span style="color:var(--color-danger)">*</span></label>
      <input class="field-input" id="ptDate" type="date">
    </div>
    <div class="field">
      <label class="field-label">총 횟수 <span style="color:var(--color-danger)">*</span></label>
      <input class="field-input" id="ptSessions" type="number" min="1" placeholder="12">
    </div>
    <div class="field">
      <label class="field-label">계약 트레이너 <span style="color:var(--color-danger)">*</span></label>
      <select class="field-select" id="ptContractTrainer"></select>
    </div>
    <div class="field">
      <label class="field-label">회당 금액</label>
      <input class="field-input" id="ptPricePerSession" type="number" placeholder="50000">
    </div>
    <div class="field">
      <label class="field-label">결제 금액 (부가세 포함)</label>
      <input class="field-input" id="ptPaymentAmount" type="number" placeholder="자동 계산">
    </div>
    <div class="field">
      <label class="field-label">메모</label>
      <textarea class="field-textarea" id="ptNotes" rows="2"></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('addPtModal')">취소</button>
      <button class="btn btn-lg btn-primary" id="btnAddPt">추가</button>
    </div>
  </div>
</div>

<!-- 담당 트레이너 변경 -->
<div class="modal-bg" id="changeTrainerModal" onclick="closeModal('changeTrainerModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">담당 트레이너 변경</div>
    <div class="err-box" id="ctErr"></div>
    <div class="field">
      <label class="field-label">계약 트레이너</label>
      <div class="field-hint" id="ctContractName"></div>
    </div>
    <div class="field">
      <label class="field-label">새 담당 트레이너</label>
      <select class="field-select" id="ctTrainerSel"></select>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('changeTrainerModal')">취소</button>
      <button class="btn btn-lg btn-primary" id="btnCtSave">변경</button>
    </div>
  </div>
</div>

<!-- 운동 상세 -->
<div class="modal-bg" id="exDetailModal" onclick="closeModal('exDetailModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <img id="exDetailImg" style="width:100%;border-radius:var(--radius-md);margin-bottom:var(--space-3);display:none;">
    <div class="modal-title" id="exDetailNameKo"></div>
    <div class="card-sub" id="exDetailNameEn" style="margin-bottom:var(--space-3);"></div>
    <div id="exDetailTags" class="chips mb-3"></div>
    <div id="exDetailMuscles"></div>
    <div class="divider"></div>
    <div class="sec-title mb-3">근육 정보 편집</div>
    <div class="field">
      <label class="field-label">주동근</label>
      <input class="field-input" id="exEditPrimary" placeholder="예: 대흉근">
    </div>
    <div class="field">
      <label class="field-label">협응근 1</label>
      <input class="field-input" id="exEditSyn1">
    </div>
    <div class="field">
      <label class="field-label">협응근 2</label>
      <input class="field-input" id="exEditSyn2">
    </div>
    <div class="field">
      <label class="field-label">스트레칭 여부</label>
      <select class="field-select" id="exEditStretch">
        <option value="false">아니오</option>
        <option value="true">예</option>
      </select>
    </div>
    <div class="btn-group">
      <button class="btn btn-lg btn-cancel" onclick="closeModal('exDetailModal')">닫기</button>
      <button class="btn btn-lg btn-primary" id="btnSaveExMuscle">저장</button>
    </div>
  </div>
</div>

<!-- 일정 상세 -->
<div class="modal-bg" id="scInfoModal" onclick="closeModal('scInfoModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="scInfoMember"></div>
    <div id="scInfoStatus"></div>
    <div id="scInfoDetail"></div>
    <div class="err-box" id="scInfoErr" style="display:none;"></div>
    <div id="scInfoWarn" style="display:none;"></div>
    <div id="scInfoActions"></div>
    <div id="scConfirmArea" style="display:none;">
      <div class="confirm-msg" id="scConfirmMsg"></div>
      <div class="btn-group">
        <button class="btn btn-lg btn-cancel" id="scConfirmCancel">취소</button>
        <button class="btn btn-lg btn-primary" id="scConfirmExec">확인</button>
      </div>
    </div>
    <div id="scEditArea" style="display:none;">
      <div class="field">
        <label class="field-label">날짜</label>
        <input class="field-input" id="scEditDate" type="date">
      </div>
      <div class="field">
        <label class="field-label">시작 시간</label>
        <input class="field-input" id="scEditStart" type="time">
      </div>
      <div class="field">
        <label class="field-label">종료 시간</label>
        <input class="field-input" id="scEditEnd" type="time">
      </div>
      <div class="btn-group">
        <button class="btn btn-lg btn-cancel" id="scEditCancel">취소</button>
        <button class="btn btn-lg btn-primary" id="scEditSave">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 메모 보기 -->
<div class="modal-bg" id="memoModal" onclick="closeModal('memoModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="memoMemberName"></div>
    <div class="card-sub" id="memoMemberMeta"></div>
    <div class="divider"></div>
    <div id="memoContent" style="white-space:pre-wrap;line-height:1.6;"></div>
  </div>
</div>

<!-- 지점 시간표 (Canvas) -->
<div class="modal-bg" id="branchSchedModal" style="align-items:center;">
  <div class="modal" style="border-radius:var(--radius-md);max-height:95dvh;">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3);">
      <div>
        <div class="modal-title" style="margin-bottom:2px;">전체 시간표</div>
        <div class="card-sub" id="bsSubtitle"></div>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="closeBranchSchedModal()">닫기</button>
    </div>
    <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-3);">
      <button class="btn btn-sm btn-secondary" id="bsBtnToday">오늘</button>
      <button class="btn btn-sm btn-ghost" id="bsBtnTomorrow">내일</button>
      <input type="date" id="bsDatePicker" class="field-input" style="flex:1;">
    </div>
    <div id="bsCanvasWrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
      <canvas id="bsCanvas"></canvas>
    </div>
    <button class="btn btn-md btn-primary btn-block mt-3" id="btnDownloadBs">이미지 저장</button>
  </div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/data-loader.js"></script>
<script src="./js/schedule-actions.js"></script>
<script src="./js/branch-schedule.js"></script>
<script src="./js/admin-app.js"></script>
</body>
</html>
