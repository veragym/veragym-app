<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f9fafb">
<title>VERA GYM</title>
<link rel="stylesheet" href="./styles/tokens.css">
<style>
  body {
    font-family: var(--font-family);
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-6);
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  .logo-ring {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 3px solid var(--accent-admin);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto var(--space-4);
  }
  .logo-text {
    font-size: 32px; font-weight: 900;
    color: var(--accent-admin);
    letter-spacing: -1px;
  }

  h1 {
    font-size: var(--text-xl);
    font-weight: 800;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: var(--space-1);
  }
  .sub {
    font-size: var(--text-sm);
    color: var(--text-tertiary);
    text-align: center;
    margin-bottom: var(--space-10);
  }

  .entry-card {
    width: 100%; max-width: 360px;
    background: var(--bg-card);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    margin-bottom: var(--space-3);
    cursor: pointer;
    transition: all var(--transition-fast);
    display: block;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow-sm);
  }
  .entry-card:active { transform: scale(0.98); }

  .entry-inner {
    display: flex; align-items: center; gap: var(--space-4);
  }

  .entry-icon {
    width: 48px; height: 48px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .entry-icon.gold   { background: var(--accent-admin-bg);   border: 1px solid var(--accent-admin-border); }
  .entry-icon.blue   { background: var(--accent-trainer-bg);  border: 1px solid var(--accent-trainer-border); }
  .entry-icon.green  { background: var(--accent-member-bg);   border: 1px solid var(--accent-member-border); }

  .entry-title {
    font-size: var(--text-base); font-weight: var(--font-bold);
    margin-bottom: 2px;
  }
  .entry-card.gold  .entry-title { color: var(--accent-admin); }
  .entry-card.blue  .entry-title { color: var(--accent-trainer); }
  .entry-card.green .entry-title { color: var(--accent-member); }

  .entry-desc {
    font-size: var(--text-xs); color: var(--text-tertiary);
  }

  .entry-arrow {
    margin-left: auto;
    color: var(--text-disabled);
    font-size: var(--text-lg);
  }
</style>
</head>
<body>

<div class="logo-ring"><div class="logo-text">VG</div></div>
<h1>VERA GYM</h1>
<p class="sub">Personal Training Management</p>

<a class="entry-card gold" href="admin-login.html">
  <div class="entry-inner">
    <div class="entry-icon gold"></div>
    <div>
      <div class="entry-title">관리자</div>
      <div class="entry-desc">트레이너 관리 · 회원 현황 · 운동DB</div>
    </div>
    <div class="entry-arrow">›</div>
  </div>
</a>

<a class="entry-card blue" href="trainer-login.html">
  <div class="entry-inner">
    <div class="entry-icon blue"></div>
    <div>
      <div class="entry-title">트레이너</div>
      <div class="entry-desc">수업일지 · 회원 관리 · 일정</div>
    </div>
    <div class="entry-arrow">›</div>
  </div>
</a>

<a class="entry-card green" href="member-view.html">
  <div class="entry-inner">
    <div class="entry-icon green"></div>
    <div>
      <div class="entry-title">회원</div>
      <div class="entry-desc">수업 기록 · 운동 자세 · 통계</div>
    </div>
    <div class="entry-arrow">›</div>
  </div>
</a>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .catch(e => console.warn('SW 등록 실패:', e));
}
</script>
</body>
</html>
